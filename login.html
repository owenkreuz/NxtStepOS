<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NxtStepOS — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #4f6ef7;
      --accent-glow: rgba(79, 110, 247, 0.25);
      --text: #eeeef2;
      --muted: #6b6b80;
      --error: #f74f6e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridShift {
      0% { transform: translateY(0); }
      100% { transform: translateY(48px); }
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(79,110,247,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      animation: fadeUp 0.5s ease forwards;
      box-shadow: 0 0 60px rgba(79,110,247,0.08), 0 24px 48px rgba(0,0,0,0.4);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
      font-weight: 300;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder {
      color: var(--muted);
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 20px rgba(79,110,247,0.35);
    }

    .btn:hover {
      opacity: 0.9;
      box-shadow: 0 6px 28px rgba(79,110,247,0.5);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(247, 79, 110, 0.1);
      border: 1px solid rgba(247, 79, 110, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-top: 16px;
      display: none;
    }

    .error-msg.show { display: block; }

    .success-msg {
      background: rgba(79, 247, 150, 0.08);
      border: 1px solid rgba(79, 247, 150, 0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #4ff796;
      margin-top: 16px;
      display: none;
    }

    .success-msg.show { display: block; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">Nxt<span>Step</span>OS</div>
  <div class="tagline">Your agency's next step.</div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your agency dashboard</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@youragency.com" />
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
  </div>

  <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div class="divider"></div>
  <p class="footer-note">NxtStepOS — AI for independent agencies</p>
</div>

<script>
  // Initialize Supabase
  const { createClient } = supabase;
  const client = createClient(
    'https://vjdjtsfjjibhjufxggid.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqZGp0c2ZqamliaGp1ZnhnZ2lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzI2NjQsImV4cCI6MjA4OTQ0ODY2NH0.eLAtNfyjGrGSKexRZ_N-RDL_u5QFlgZjbGpAfAlVmiA'
  );

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    // Reset messages
    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');

    if (!email || !password) {
      errorMsg.textContent = 'Please enter your email and password.';
      errorMsg.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const { data, error } = await client.auth.signInWithPassword({ email, password });

    if (error) {
      errorMsg.textContent = error.message;
      errorMsg.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      successMsg.textContent = 'Signed in! Redirecting to your dashboard...';
      successMsg.classList.add('show');
      setTimeout(() => {
        window.location.href = '/dashboard.html';
      }, 1200);
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
