<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NxtStepOS — Import Clients</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }
    .card {
      background: #141414;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 28px;
      max-width: 860px;
      margin: 0 auto 24px;
    }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
    input[type="file"] {
      display: block;
      width: 100%;
      padding: 12px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e5e5e5;
      font-size: 0.9rem;
      cursor: pointer;
    }
    input[type="file"]:hover { border-color: #c9a84c; }
    button {
      margin-top: 18px;
      padding: 12px 28px;
      background: #c9a84c;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #d4b560; }
    .hint {
      color: #666;
      font-size: 0.78rem;
      margin-top: 10px;
      line-height: 1.6;
    }
    .hint strong { color: #999; }

    #status { max-width: 860px; margin: 0 auto; }
    .summary {
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      border: 1px solid;
    }
    .summary.info    { background: #0d1a2e; border-color: #1d4ed8; color: #93c5fd; }
    .summary.success { background: #052e16; border-color: #16a34a; color: #86efac; }
    .summary.warning { background: #1c1002; border-color: #ca8a04; color: #fde047; }
    .summary.error   { background: #1f0606; border-color: #dc2626; color: #fca5a5; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      background: #141414;
      border: 1px solid #262626;
      border-radius: 8px;
      overflow: hidden;
    }
    th {
      background: #1a1a1a;
      color: #aaa;
      font-weight: 600;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #262626;
    }
    td { padding: 9px 12px; border-bottom: 1px solid #1e1e1e; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.ok        { background: #052e16; color: #86efac; }
    .badge.skipped   { background: #1c1002; color: #fde047; }
    .badge.fail      { background: #1f0606; color: #fca5a5; }
    .badge.duplicate { background: #12101e; color: #a78bfa; }
    .err-msg { color: #f87171; margin-top: 3px; font-size: 0.78rem; word-break: break-word; }
    .del-btn {
      margin-top: 0;
      padding: 3px 8px;
      background: transparent;
      border: 1px solid #3a1a1a;
      color: #f87171;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 0;
    }
    .del-btn:hover { background: #1f0606; border-color: #f87171; }

    #search-section { max-width: 860px; margin: 0 auto 24px; }
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .search-bar input[type="text"] {
      flex: 1;
      padding: 11px 14px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e5e5e5;
      font-size: 0.9rem;
      outline: none;
    }
    .search-bar input[type="text"]:focus { border-color: #c9a84c; }
    .search-bar select {
      padding: 11px 14px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e5e5e5;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .search-bar select:focus { border-color: #c9a84c; }
    #client-count { color: #666; font-size: 0.8rem; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div style="max-width:860px;margin:0 auto 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">
    <div>
      <h1>Import Clients</h1>
      <p class="subtitle">Upload a CSV to import clients into NxtStepOS. Errors appear per row.</p>
    </div>
    <button id="exportBtn" style="margin-top:6px;background:#1e1e1e;color:#e5e5e5;border:1px solid #333;white-space:nowrap;">Export CSV</button>
  </div>

  <div class="card">
    <label for="csvFile">Select CSV file</label>
    <input type="file" id="csvFile" accept=".csv,text/csv" />
    <p class="hint">
      <strong>Required:</strong> first_name, last_name<br>
      <strong>Optional:</strong> email, phone, policy_type, renewal_date, status, notes, agency_id<br>
      Common aliases are recognised (e.g. "First Name", "Last Name", "name", "Email Address").
    </p>
    <button id="importBtn" disabled>Import Clients</button>
  </div>

  <div id="search-section">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name, email, phone…" />
      <select id="statusFilter">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
      <select id="policyFilter">
        <option value="">All policy types</option>
      </select>
    </div>
    <div id="client-count"></div>
    <div id="client-table"></div>
  </div>

  <div id="status"></div>

<script>
  const SUPABASE_URL = 'https://vjdjtsfjjibhjufxggid.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqZGp0c2ZqamliaGp1ZnhnZ2lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzI2NjQsImV4cCI6MjA4OTQ0ODY2NH0.eLAtNfyjGrGSKexRZ_N-RDL_u5QFlgZjbGpAfAlVmiA';

  const fileInput = document.getElementById('csvFile');
  const importBtn = document.getElementById('importBtn');
  const statusEl  = document.getElementById('status');

  fileInput.addEventListener('change', () => {
    importBtn.disabled = !fileInput.files.length;
    statusEl.innerHTML = '';
  });

  importBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) return;

    importBtn.disabled = true;
    statusEl.innerHTML = '<div class="summary info">Reading CSV…</div>';

    try {
      const text = await file.text();
      const rows = parseCSV(text);

      if (rows.length === 0) {
        statusEl.innerHTML = '<div class="summary warning">CSV is empty or could not be parsed.</div>';
        importBtn.disabled = false;
        return;
      }

      statusEl.innerHTML = `<div class="summary info">Parsed <strong>${rows.length}</strong> row(s). Importing…</div>`;

      const results = [];
      let ok = 0, skipped = 0, dupes = 0, failed = 0;

      for (let i = 0; i < rows.length; i++) {
        const raw = rows[i];
        const record = mapColumns(raw);

        // Validate required fields — show exactly what's missing
        const missing = [];
        if (!record.first_name) missing.push('first_name');
        if (!record.last_name)  missing.push('last_name');

        if (missing.length > 0) {
          const headers = Object.keys(raw).join(', ');
          results.push({
            row: i + 2,
            status: 'skipped',
            label: `${raw[Object.keys(raw)[0]] || '(empty)'} ${raw[Object.keys(raw)[1]] || ''}`.trim(),
            reason: `Missing required field(s): ${missing.join(', ')}. CSV headers found: [${headers}]`
          });
          skipped++;
          continue;
        }

        // Duplicate check — query by first_name + last_name
        const dupeCheck = await fetch(
          `${SUPABASE_URL}/rest/v1/clients?first_name=eq.${encodeURIComponent(record.first_name)}&last_name=eq.${encodeURIComponent(record.last_name)}&select=id&limit=1`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        if (dupeCheck.ok) {
          const existing = await dupeCheck.json();
          if (existing.length > 0) {
            results.push({ row: i + 2, status: 'duplicate', label: `${record.first_name} ${record.last_name}`, reason: 'Already exists in database' });
            dupes++;
            continue;
          }
        }

        // Build clean record with only known columns
        const payload = {
          first_name:   record.first_name,
          last_name:    record.last_name,
        };
        if (record.email)        payload.email        = record.email;
        if (record.phone)        payload.phone        = record.phone;
        if (record.policy_type)  payload.policy_type  = record.policy_type;
        if (record.renewal_date) payload.renewal_date = record.renewal_date;
        if (record.status)       payload.status       = record.status;
        if (record.notes)        payload.notes        = record.notes;
        if (record.agency_id)    payload.agency_id    = record.agency_id;

        const res = await fetch(`${SUPABASE_URL}/rest/v1/clients`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(payload)
        });

        const name = `${record.first_name} ${record.last_name}`;

        if (res.ok) {
          results.push({ row: i + 2, status: 'ok', label: name });
          ok++;
        } else {
          let errMsg = `HTTP ${res.status}`;
          try {
            const body = await res.json();
            // Supabase error shape: { code, details, hint, message }
            const parts = [];
            if (body.message) parts.push(body.message);
            if (body.details) parts.push(`Details: ${body.details}`);
            if (body.hint)    parts.push(`Hint: ${body.hint}`);
            if (body.code)    parts.push(`Code: ${body.code}`);
            errMsg = parts.length ? parts.join(' — ') : JSON.stringify(body);
          } catch (_) {
            errMsg = (await res.text().catch(() => '')) || errMsg;
          }
          results.push({ row: i + 2, status: 'fail', label: name, reason: errMsg });
          failed++;
        }
      }

      // Summary banner
      let bannerClass = 'success';
      if (failed > 0 && ok === 0) bannerClass = 'error';
      else if (failed > 0 || skipped > 0 || dupes > 0) bannerClass = 'warning';

      let html = `<div class="summary ${bannerClass}">
        <strong>${ok}</strong> imported &nbsp;·&nbsp;
        <strong>${dupes}</strong> duplicate${dupes !== 1 ? 's' : ''} &nbsp;·&nbsp;
        <strong>${skipped}</strong> skipped &nbsp;·&nbsp;
        <strong>${failed}</strong> failed
      </div>`;

      html += `<table>
        <thead><tr>
          <th>Row</th><th>Status</th><th>Name</th><th>Error / Reason</th>
        </tr></thead><tbody>`;

      for (const r of results) {
        const badgeClass = r.status === 'ok' ? 'ok' : r.status === 'skipped' ? 'skipped' : r.status === 'duplicate' ? 'duplicate' : 'fail';
        const badgeLabel = r.status === 'ok' ? 'Imported' : r.status === 'skipped' ? 'Skipped' : r.status === 'duplicate' ? 'Duplicate' : 'Failed';
        const detail = r.reason ? `<div class="err-msg">${escHtml(r.reason)}</div>` : '';
        html += `<tr>
          <td>${r.row}</td>
          <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
          <td>${escHtml(r.label)}</td>
          <td>${detail}</td>
        </tr>`;
      }

      html += '</tbody></table>';
      statusEl.innerHTML = html;

    } catch (err) {
      statusEl.innerHTML = `<div class="summary error"><strong>Unexpected error:</strong> ${escHtml(err.message)}</div>`;
    }

    importBtn.disabled = false;
  });

  // ── CSV parser ─────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    const nonEmpty = lines.filter(l => l.trim() !== '');
    if (nonEmpty.length < 2) return [];
    const headers = splitLine(nonEmpty[0]).map(h => h.trim());
    return nonEmpty.slice(1).map(line => {
      const vals = splitLine(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
      return obj;
    }).filter(row => Object.values(row).some(v => v !== ''));
  }

  function splitLine(line) {
    const out = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        out.push(cur); cur = '';
      } else {
        cur += c;
      }
    }
    out.push(cur);
    return out;
  }

  // ── Column alias mapper ────────────────────────────────────────────────────
  const ALIASES = {
    first_name:   ['first_name','first name','firstname','first','given name','given_name','fname'],
    last_name:    ['last_name','last name','lastname','last','surname','family name','family_name','lname'],
    email:        ['email','email address','e-mail','e_mail','mail'],
    phone:        ['phone','phone number','phone_number','mobile','cell','telephone'],
    policy_type:  ['policy_type','policy type','policytype','type','insurance type','insurance_type','line of business'],
    renewal_date: ['renewal_date','renewal date','renewaldate','renewal','expiration','expiration date','exp date','exp_date'],
    status:       ['status','client status','account status'],
    notes:        ['notes','note','comments','comment','description'],
    agency_id:    ['agency_id','agency id','agencyid','agency'],
  };

  // Build reverse lookup: lowercased alias → field name
  const ALIAS_MAP = {};
  for (const [field, aliases] of Object.entries(ALIASES)) {
    for (const a of aliases) ALIAS_MAP[a.toLowerCase()] = field;
  }

  function mapColumns(raw) {
    const record = {};
    let firstName = '', lastName = '';

    for (const [key, val] of Object.entries(raw)) {
      const k = key.toLowerCase().trim();
      const mapped = ALIAS_MAP[k];

      if (mapped) {
        record[mapped] = val;
      } else if (k === 'name' || k === 'full name' || k === 'full_name' || k === 'client name' || k === 'contact') {
        // Split "John Smith" → first_name / last_name (only if not already set)
        const parts = val.trim().split(/\s+/);
        if (!record.first_name) record.first_name = parts[0] || '';
        if (!record.last_name)  record.last_name  = parts.slice(1).join(' ') || '';
      }
      // Unknown columns are intentionally dropped — avoids sending garbage to Supabase
    }

    return record;
  }

  // ── Shared config ──────────────────────────────────────────────────────────
  const EXPORT_COLS = ['first_name','last_name','email','phone','policy_type','renewal_date','status','notes','agency_id'];
  const FETCH_COLS  = ['id', ...EXPORT_COLS];

  // ── Client search / filter ─────────────────────────────────────────────────
  let allClients = [];

  async function loadClients() {
    const countEl = document.getElementById('client-count');
    const tableEl = document.getElementById('client-table');
    countEl.textContent = 'Loading…';
    tableEl.innerHTML = '';

    let res;
    try {
      res = await fetch(
        `${SUPABASE_URL}/rest/v1/clients?select=${FETCH_COLS.join(',')}&order=last_name.asc,first_name.asc&limit=10000`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
    } catch (err) {
      countEl.textContent = '';
      tableEl.innerHTML = `<p style="color:#f87171;font-size:0.85rem;padding:12px 0;">Network error: ${escHtml(err.message)}</p>`;
      return;
    }

    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      countEl.textContent = '';
      tableEl.innerHTML = `<p style="color:#f87171;font-size:0.85rem;padding:12px 0;">Failed to load clients: ${escHtml(body.message || 'HTTP ' + res.status)}</p>`;
      return;
    }

    allClients = await res.json();

    // Repopulate policy type filter (clear first to avoid duplicates on reload)
    const policyFilter = document.getElementById('policyFilter');
    policyFilter.innerHTML = '<option value="">All policy types</option>';
    const types = [...new Set(allClients.map(c => c.policy_type).filter(Boolean))].sort();
    types.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      policyFilter.appendChild(opt);
    });

    renderClients();
  }

  function renderClients() {
    const q      = document.getElementById('searchInput').value.toLowerCase().trim();
    const status = document.getElementById('statusFilter').value;
    const policy = document.getElementById('policyFilter').value;

    const filtered = allClients.filter(c => {
      if (status && c.status !== status) return false;
      if (policy && c.policy_type !== policy) return false;
      if (q) {
        const haystack = [c.first_name, c.last_name, c.email, c.phone].join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });

    document.getElementById('client-count').textContent =
      `${filtered.length} client${filtered.length !== 1 ? 's' : ''}${allClients.length !== filtered.length ? ` of ${allClients.length}` : ''}`;

    if (filtered.length === 0) {
      document.getElementById('client-table').innerHTML =
        '<p style="color:#666;font-size:0.85rem;padding:12px 0;">No clients match.</p>';
      return;
    }

    let html = `<table><thead><tr>
      <th>Name</th><th>Email</th><th>Phone</th><th>Policy Type</th><th>Renewal</th><th>Status</th><th></th>
    </tr></thead><tbody>`;

    for (const c of filtered) {
      const statusBadge = c.status === 'active'
        ? '<span class="badge ok">Active</span>'
        : c.status === 'inactive'
          ? '<span class="badge skipped">Inactive</span>'
          : escHtml(c.status || '—');
      html += `<tr data-id="${c.id}">
        <td>${escHtml((c.first_name || '') + ' ' + (c.last_name || ''))}</td>
        <td>${escHtml(c.email || '—')}</td>
        <td>${escHtml(c.phone || '—')}</td>
        <td>${escHtml(c.policy_type || '—')}</td>
        <td>${escHtml(c.renewal_date || '—')}</td>
        <td>${statusBadge}</td>
        <td><button class="del-btn" data-id="${c.id}" title="Delete client">✕</button></td>
      </tr>`;
    }

    html += '</tbody></table>';
    document.getElementById('client-table').innerHTML = html;

    // Wire up delete buttons
    document.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const row = btn.closest('tr');
        const name = row.querySelector('td').textContent;
        if (!confirm(`Delete ${name}?`)) return;

        btn.disabled = true;
        btn.textContent = '…';

        const res = await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${id}`, {
          method: 'DELETE',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });

        if (res.ok) {
          allClients = allClients.filter(c => String(c.id) !== String(id));
          renderClients();
        } else {
          const body = await res.json().catch(() => ({}));
          alert(`Delete failed: ${body.message || 'HTTP ' + res.status}`);
          btn.disabled = false;
          btn.textContent = '✕';
        }
      });
    });
  }

  document.getElementById('searchInput').addEventListener('input', renderClients);
  document.getElementById('statusFilter').addEventListener('change', renderClients);
  document.getElementById('policyFilter').addEventListener('change', renderClients);

  // Reload client list after a successful import
  const _origImportBtn = document.getElementById('importBtn');
  _origImportBtn.addEventListener('click', () => setTimeout(loadClients, 3000));

  loadClients();

  // ── Export ─────────────────────────────────────────────────────────────────
  document.getElementById('exportBtn').addEventListener('click', async () => {
    const btn = document.getElementById('exportBtn');
    btn.disabled = true;
    btn.textContent = 'Exporting…';

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/clients?select=${EXPORT_COLS.join(',')}&order=last_name.asc,first_name.asc&limit=10000`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        alert(`Export failed: ${body.message || 'HTTP ' + res.status}`);
        return;
      }

      const clients = await res.json();
      if (clients.length === 0) { alert('No clients found.'); return; }

      const csvRows = [EXPORT_COLS.join(',')];
      for (const c of clients) {
        csvRows.push(EXPORT_COLS.map(col => {
          const val = c[col] == null ? '' : String(c[col]);
          return val.includes(',') || val.includes('"') || val.includes('\n')
            ? `"${val.replace(/"/g, '""')}"` : val;
        }).join(','));
      }

      const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `clients_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert(`Export error: ${err.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Export CSV';
    }
  });

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
